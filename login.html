<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Authentication | Fhinovax AI System</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
  </head>
  <body class="bg-slate-950 text-slate-200 min-h-screen flex items-center justify-center font-['Inter'] selection:bg-brand-blue selection:text-white relative overflow-hidden">
    
    <!-- Ambient Background -->
    <div class="fixed inset-0 w-full h-full overflow-hidden z-[-1] pointer-events-none">
      <div class="absolute top-[-20%] left-[-10%] w-[40rem] h-[40rem] bg-brand-blue/30 rounded-full blur-[120px] animate-pulse"></div>
      <div class="absolute bottom-[-20%] right-[-10%] w-[35rem] h-[35rem] bg-brand-gold/10 rounded-full blur-[100px] animate-pulse animation-delay-2000"></div>
    </div>

    <!-- Auth Container -->
    <div class="w-full max-w-md px-6 z-10">
       
       <!-- Logo -->
       <a href="/index.html" class="flex flex-col items-center gap-4 mb-10 group cursor-pointer">
         <div class="w-16 h-16 bg-gradient-to-br from-brand-blue to-brand-gold rounded-2xl flex items-center justify-center text-white font-bold text-3xl shadow-[0_0_30px_rgba(26,75,156,0.5)] group-hover:scale-105 transition-transform duration-300 ring-1 ring-white/20">
           F
         </div>
         <div class="text-center">
           <h1 class="font-bold text-2xl text-white tracking-tight">Fhinovax <span class="text-transparent bg-clip-text bg-gradient-to-r from-brand-blue to-brand-gold">AI Portal</span></h1>
           <p class="text-sm text-slate-400 mt-1">Client Authorization System</p>
         </div>
       </a>

       <!-- Form Box -->
       <div class="glass rounded-3xl p-8 border border-white/10 shadow-2xl relative overflow-hidden">
          <div class="absolute inset-x-0 top-0 h-1 bg-gradient-to-r from-brand-blue via-brand-gold to-brand-blue"></div>
          
          <div class="mb-6 flex justify-between items-center pb-4 border-b border-white/5">
             <button class="font-bold text-brand-gold border-b-2 border-brand-gold pb-1 transition w-1/2 text-center text-sm uppercase tracking-wider">Access portal</button>
             <button class="font-medium text-slate-400 hover:text-white pb-1 transition w-1/2 text-center text-sm uppercase tracking-wider">New Client Setup</button>
          </div>

          <form action="/dashboard.html" class="flex flex-col gap-4">
             <!-- Email / Password -->
             <div>
               <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Email Address</label>
               <input type="email" class="w-full bg-slate-900 border border-white/10 rounded-xl px-4 py-3 text-slate-200 focus:ring-2 focus:ring-brand-blue outline-none transition placeholder-slate-600" placeholder="e.g. client@example.com" required />
             </div>
             <div>
               <div class="flex justify-between items-center mb-1.5">
                  <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">Password</label>
                  <a href="#" class="text-xs text-brand-blue hover:text-brand-gold transition">Forgot?</a>
               </div>
               <input type="password" class="w-full bg-slate-900 border border-white/10 rounded-xl px-4 py-3 text-slate-200 focus:ring-2 focus:ring-brand-blue outline-none transition placeholder-slate-600" placeholder="••••••••" required />
             </div>
             
             <button type="submit" class="w-full mt-2 py-3.5 rounded-xl bg-gradient-to-r from-brand-blue to-brand-blue-dark hover:opacity-90 transition font-bold text-white shadow-[0_0_15px_rgba(26,75,156,0.2)] border border-brand-blue/30 flex items-center justify-center gap-2 group">
               Continue with Email
               <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>
             </button>

             <!-- Divider -->
             <div class="flex items-center gap-3 my-2 opacity-50">
                 <div class="h-px bg-white/20 flex-1"></div>
                 <span class="text-[10px] text-white uppercase tracking-widest font-bold">OR</span>
                 <div class="h-px bg-white/20 flex-1"></div>
             </div>

             <!-- Social Auth -->
             <div class="flex flex-col gap-3">
                 <button type="button" class="w-full py-3 rounded-xl glass hover:bg-white/10 transition font-medium text-sm text-slate-200 border border-white/5 flex items-center justify-center gap-3">
                   <svg class="h-5 w-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                   Secure Signup with Google
                 </button>
                 
                 <div class="flex gap-3">
                   <button type="button" class="flex-1 py-3 rounded-xl glass hover:bg-white/10 transition font-medium text-sm text-slate-200 border border-white/5 flex items-center justify-center gap-2">
                     <svg class="h-5 w-5 text-[#1877F2]" fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                     Facebook
                   </button>
                   <button type="button" class="flex-1 py-3 rounded-xl glass hover:bg-white/10 transition font-medium text-sm text-slate-200 border border-white/5 flex items-center justify-center gap-2">
                     <svg class="h-4 w-4 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                     X (Twitter)
                   </button>
                 </div>
             </div>
             
             <div class="text-center mt-2">
                <span class="text-xs text-slate-500 flex items-center justify-center gap-2">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>
                  Protected by Fhinovax Security & AI Fraud Shield
                </span>
             </div>
          </form>
       </div>

    </div>
  </body>
</html>
